name: Build & Deploy to Production

on:
  push:
    branches:
      - production

concurrency:
  group: production-deploy
  cancel-in-progress: false  # Never cancel a running deploy — finish it first

env:
  REGISTRY: ghcr.io

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Lint & build check (catches errors before we build the image)
  # ---------------------------------------------------------------------------
  test:
    name: Lint & Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build check
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}

  # ---------------------------------------------------------------------------
  # Job 2 — Build Docker image and push to GitHub Container Registry
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ env.REGISTRY }}/${{ github.repository_owner }}/statsghana-website' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

  # ---------------------------------------------------------------------------
  # Job 3 — SSH into server, pull new image, restart container
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            # Log in to GHCR on the server
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the latest image
            docker pull ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/statsghana-website:latest

            # Bring up new container
            cd /opt/statsghana
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Give the container time to initialise before polling
            echo "Waiting 30s for container to initialise..."
            sleep 30

            # Wait for health check to pass (up to 3 minutes)
            echo "Polling health check..."
            for i in $(seq 1 36); do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health || true)
              if [ "$HTTP_CODE" = "200" ]; then
                echo "Health check passed (attempt $i)."
                break
              fi
              echo "Attempt $i/36 — got HTTP $HTTP_CODE, waiting 5s..."
              sleep 5
            done

            if [ "$HTTP_CODE" != "200" ]; then
              echo "Health check failed after 3 minutes — last HTTP code: $HTTP_CODE"
              docker logs statsghana-web --tail 50
              exit 1
            fi

            # Clean up old unused images
            docker image prune -f
