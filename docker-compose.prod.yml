services:
  # ---------------------------------------------------------------------------
  # Next.js application
  # HestiaCP nginx handles SSL termination and proxies to this container.
  # ---------------------------------------------------------------------------
  web:
    image: ghcr.io/${GHCR_OWNER}/statsghana-website:latest
    container_name: statsghana-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # loopback only — HestiaCP nginx proxies to this
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-true}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_FORCE_PATH_STYLE: ${MINIO_FORCE_PATH_STYLE:-true}
      PXWEB_BASE_URL: ${PXWEB_BASE_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
